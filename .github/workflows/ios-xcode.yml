name: iOS Xcode

on:
  pull_request:
    branches: [main]
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      mdbx_ref:
        description: Monica-Pass/Mdbx ref for Xcode build and test
        required: false
        default: master

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event.inputs.mdbx_ref || 'master' }}
  cancel-in-progress: true

jobs:
  mdbx-artifact:
    name: Prepare MDBX artifact (${{ github.event.inputs.mdbx_ref || 'master' }})
    runs-on: macos-15
    outputs:
      mdbx-sha: ${{ steps.mdbx-cache-key.outputs.sha }}
      mdbx-tooling: ${{ steps.mdbx-cache-key.outputs.tooling }}

    steps:
      - name: Check out iOS repository
        uses: actions/checkout@v4
        with:
          path: ios

      - name: Check out Monica MDBX
        uses: actions/checkout@v4
        with:
          repository: Monica-Pass/Mdbx
          ref: ${{ github.event.inputs.mdbx_ref || 'master' }}
          path: mdbx

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios

      - name: Capture MDBX cache key inputs
        id: mdbx-cache-key
        run: |
          set -euo pipefail
          echo "sha=$(git -C mdbx rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          {
            shasum ios/Scripts/build-mdbx-xcframework.sh
            shasum ios/Scripts/generate-mdbx-swift-bindings.sh
            shasum ios/SwiftPackages/MonicaMDBX/Package.swift
            rustc -Vv
          } | shasum | awk '{print "tooling="$1}' >> "$GITHUB_OUTPUT"

      - name: Cache Rust dependencies and MDBX targets
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin/uniffi-bindgen-swift
            mdbx/target
          key: ${{ runner.os }}-cargo-mdbx-${{ steps.mdbx-cache-key.outputs.sha }}-${{ steps.mdbx-cache-key.outputs.tooling }}
          restore-keys: |
            ${{ runner.os }}-cargo-mdbx-${{ steps.mdbx-cache-key.outputs.sha }}-
            ${{ runner.os }}-cargo-mdbx-

      - name: Install UniFFI Swift bindgen
        run: |
          set -euo pipefail
          if ! command -v uniffi-bindgen-swift >/dev/null 2>&1; then
            cargo install uniffi --version 0.31.1 --locked --features cli
          fi

      - name: Cache MDBX generated artifact
        id: mdbx-artifact-cache
        uses: actions/cache@v4
        with:
          path: |
            ios/Artifacts/MDBX/MonicaMDBXGenerated.xcframework
            ios/SwiftPackages/MonicaMDBX/Sources/MonicaMDBX/Generated
          key: ${{ runner.os }}-mdbx-ios-artifact-${{ steps.mdbx-cache-key.outputs.sha }}-${{ steps.mdbx-cache-key.outputs.tooling }}

      - name: Build MDBX XCFramework
        if: steps.mdbx-artifact-cache.outputs.cache-hit != 'true'
        working-directory: ios
        run: Scripts/build-mdbx-xcframework.sh

      - name: Validate generated MDBX artifact
        working-directory: ios
        run: |
          set -euo pipefail
          test -d Artifacts/MDBX/MonicaMDBXGenerated.xcframework
          test -f SwiftPackages/MonicaMDBX/Sources/MonicaMDBX/Generated/mdbx_ffi.swift
          plutil -lint Artifacts/MDBX/MonicaMDBXGenerated.xcframework/Info.plist

      - name: Pack MDBX artifact
        working-directory: ios
        run: |
          set -euo pipefail
          tar -czf mdbx-ios-artifacts.tgz \
            Artifacts/MDBX/MonicaMDBXGenerated.xcframework \
            SwiftPackages/MonicaMDBX/Sources/MonicaMDBX/Generated

      - name: Upload MDBX artifact
        uses: actions/upload-artifact@v4
        with:
          name: mdbx-ios-artifacts
          path: ios/mdbx-ios-artifacts.tgz
          if-no-files-found: error

  build:
    name: Build ${{ matrix.scheme }} (${{ matrix.configuration }})
    runs-on: macos-15
    needs: mdbx-artifact
    strategy:
      fail-fast: false
      matrix:
        scheme:
          - Monica
          - MonicaAutoFillExtension
          - MonicaShareExtension
          - MonicaWidgetExtension
        configuration:
          - Debug
          - Release

    steps:
      - name: Check out iOS repository
        uses: actions/checkout@v4
        with:
          path: ios

      - name: Download MDBX artifact
        uses: actions/download-artifact@v4
        with:
          name: mdbx-ios-artifacts
          path: ios

      - name: Unpack MDBX artifact
        working-directory: ios
        run: tar -xzf mdbx-ios-artifacts.tgz

      - name: Cache Xcode build data
        uses: actions/cache@v4
        with:
          path: ios/DerivedData
          key: ${{ runner.os }}-xcode-${{ matrix.scheme }}-${{ matrix.configuration }}-${{ needs.mdbx-artifact.outputs.mdbx-sha }}-${{ needs.mdbx-artifact.outputs.mdbx-tooling }}-${{ hashFiles('ios/Monica.xcodeproj/project.pbxproj', 'ios/Monica.xcodeproj/xcshareddata/xcschemes/*.xcscheme', 'ios/SwiftPackages/**/Package.swift', 'ios/SwiftPackages/**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-xcode-${{ matrix.scheme }}-${{ matrix.configuration }}-
            ${{ runner.os }}-xcode-

      - name: Build scheme
        working-directory: ios
        run: |
          set -euo pipefail
          xcodebuild build \
            -project Monica.xcodeproj \
            -scheme "${{ matrix.scheme }}" \
            -configuration "${{ matrix.configuration }}" \
            -destination "generic/platform=iOS Simulator" \
            -derivedDataPath DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

  tests:
    name: Run Monica XCTest suite
    runs-on: macos-15
    needs: mdbx-artifact

    steps:
      - name: Check out iOS repository
        uses: actions/checkout@v4
        with:
          path: ios

      - name: Download MDBX artifact
        uses: actions/download-artifact@v4
        with:
          name: mdbx-ios-artifacts
          path: ios

      - name: Unpack MDBX artifact
        working-directory: ios
        run: tar -xzf mdbx-ios-artifacts.tgz

      - name: Cache Xcode test build data
        uses: actions/cache@v4
        with:
          path: ios/DerivedData
          key: ${{ runner.os }}-xcode-tests-${{ needs.mdbx-artifact.outputs.mdbx-sha }}-${{ needs.mdbx-artifact.outputs.mdbx-tooling }}-${{ hashFiles('ios/Monica.xcodeproj/project.pbxproj', 'ios/Monica.xcodeproj/xcshareddata/xcschemes/*.xcscheme', 'ios/SwiftPackages/**/Package.swift', 'ios/SwiftPackages/**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-xcode-tests-
            ${{ runner.os }}-xcode-

      - name: Select available iPhone simulator
        run: |
          set -euo pipefail
          device_name="$(xcrun simctl list devices available | awk -F'[()]' '/iPhone/ {gsub(/^[ \t]+|[ \t]+$/, "", $1); print $1; exit}')"
          if [ -z "$device_name" ]; then
            echo "No available iPhone simulator found."
            xcrun simctl list devices available
            exit 1
          fi
          echo "IOS_DESTINATION=platform=iOS Simulator,name=${device_name},OS=latest" >> "$GITHUB_ENV"
          echo "Selected simulator: ${device_name}"

      - name: Run tests
        working-directory: ios
        run: |
          set -euo pipefail
          xcodebuild test \
            -project Monica.xcodeproj \
            -scheme Monica \
            -destination "$IOS_DESTINATION" \
            -derivedDataPath DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO
